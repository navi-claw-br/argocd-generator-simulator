apiVersion: apps/v1
kind: Deployment
metadata:
  name: generator-simulator
  namespace: generator-simulator
  labels:
    app: generator-simulator
spec:
  replicas: 2
  selector:
    matchLabels:
      app: generator-simulator
  template:
    metadata:
      labels:
        app: generator-simulator
    spec:
      containers:
      - name: simulator
        image: ghcr.io/navi-claw-br/argocd-generator-simulator:latest
        ports:
        - containerPort: 3000
          name: http
        resources:
          requests:
            cpu: 100m
            memory: 64Mi
          limits:
            cpu: 500m
            memory: 256Mi
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10
