apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: guestbook
  namespace: argocd
spec:
  goTemplate: true
  generators:
  - list:
      elements:
        - cluster: engineering-dev
          name: dev
          replicas: "2"
        - cluster: engineering-prod
          name: prod
          replicas: "5"
  template:
    metadata:
      name: '{{.cluster}}-guestbook'
    spec:
      project: "my-project"
      source:
        repoURL: https://github.com/argoproj/argo-cd.git
        targetRevision: HEAD
        path: applicationset/examples/list-generator/guestbook/{{.name}}
        helm:
          parameters:
            - name: replicas
              value: '{{.replicas}}'
      destination:
        server: https://kubernetes.default.svc
        namespace: guestbook
